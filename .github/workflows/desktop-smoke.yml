name: Desktop Smoke

on:
  push:
    paths:
      - ".github/workflows/desktop-smoke.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/desktop/**"
      - "packages/mcp/**"
      - "packages/runtime/**"
      - "scripts/sync-version-metadata.mjs"
  pull_request:
    paths:
      - ".github/workflows/desktop-smoke.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/desktop/**"
      - "packages/mcp/**"
      - "packages/runtime/**"
      - "scripts/sync-version-metadata.mjs"

jobs:
  desktop-smoke:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run packaged desktop smoke
        run: pnpm --dir packages/desktop verify:packaged:mac

      - name: Run desktop UI smoke
        run: pnpm --dir packages/desktop smoke:packaged:mac
