name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Desktop package version to release, without the leading v.
        required: true
        type: string
      publish:
        description: Upload artifacts to the GitHub Release after all builds pass.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            runner: macos-26
            builderArgs: --mac dmg zip --universal
            artifactName: macos-universal
          - name: Linux x64
            runner: ubuntu-latest
            builderArgs: --linux AppImage deb tar.gz --x64
            artifactName: linux-x64
          - name: Windows x64
            runner: windows-latest
            builderArgs: --win nsis zip --x64
            artifactName: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify desktop version
        env:
          DESKTOP_VERSION: ${{ inputs.version }}
        run: node -e "const pkg = require('./packages/desktop/package.json'); if (pkg.version !== process.env.DESKTOP_VERSION) { throw new Error('Expected desktop version ' + process.env.DESKTOP_VERSION + ', found ' + pkg.version); }"

      - name: Build desktop app
        run: pnpm --dir packages/desktop build

      - name: Build desktop installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm --dir packages/desktop exec electron-builder ${{ matrix.builderArgs }} --publish never

      - name: Install Linux smoke dependencies
        if: matrix.artifactName == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Verify Linux packaged startup
        if: matrix.artifactName == 'linux-x64'
        run: xvfb-run -a node packages/desktop/scripts/verify-packaged-app.mjs

      - name: Verify Windows packaged startup
        if: matrix.artifactName == 'windows-x64'
        run: node packages/desktop/scripts/verify-packaged-app.mjs

      - name: Verify macOS packaged startup
        if: matrix.artifactName == 'macos-universal'
        run: node packages/desktop/scripts/verify-packaged-app.mjs

      - name: Verify macOS universal binary
        if: matrix.artifactName == 'macos-universal'
        run: |
          set -euo pipefail
          app_binary="$(find packages/desktop/release -path '*/PlanWeave.app/Contents/MacOS/PlanWeave' -type f | head -n 1)"
          test -n "${app_binary}"
          lipo -info "${app_binary}" | tee /tmp/planweave-lipo.txt
          grep -Eq 'x86_64|x64' /tmp/planweave-lipo.txt
          grep -q 'arm64' /tmp/planweave-lipo.txt

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.artifactName }}
          if-no-files-found: error
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.blockmap
            packages/desktop/release/*.deb
            packages/desktop/release/*.dmg
            packages/desktop/release/*.exe
            packages/desktop/release/*.tar.gz
            packages/desktop/release/*.yml
            packages/desktop/release/*.zip

  verify-assets:
    name: Verify release artifacts
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: desktop-artifacts
          merge-multiple: true

      - name: Verify required assets
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          find desktop-artifacts -maxdepth 1 -type f -printf '%f\n' | sort

          required_patterns=(
            "PlanWeave-${VERSION}-linux-x64.AppImage"
            "PlanWeave-${VERSION}-linux-x64.deb"
            "PlanWeave-${VERSION}-linux-x64.tar.gz"
            "PlanWeave-${VERSION}-mac-universal.zip"
            "PlanWeave-${VERSION}-universal.dmg"
            "PlanWeave-${VERSION}-win-x64.exe"
            "PlanWeave-${VERSION}-win-x64.zip"
            "latest-linux.yml"
            "latest-mac.yml"
            "latest.yml"
          )

          for pattern in "${required_patterns[@]}"; do
            if ! find desktop-artifacts -maxdepth 1 -name "${pattern}" -type f | grep -q .; then
              echo "Missing required asset: ${pattern}" >&2
              exit 1
            fi
          done

  publish:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs: verify-assets
    if: inputs.publish == 'true'
    permissions:
      contents: write

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: desktop-artifacts
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" --target "${GITHUB_SHA}" --title "${VERSION}" --generate-notes
          fi
          gh release upload "${tag}" desktop-artifacts/* --clobber
          gh release view "${tag}" --json tagName,name,isDraft,isPrerelease,url,assets
